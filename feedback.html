 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Anold's Fast Bites</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <div class="container nav-container">
            <div class="logo">
                <img src="anold.logo.png.jpg" alt="Anold's Fast Bites Logo" height="80">
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="feedback.html" class="active">Feedback</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
 
    <!-- Feedback Section -->
    <section class="feedback-page">
        <div class="container feedback-container">
            <h1>We Value Your Feedback!</h1>
            <p>Please let us know how we’re doing. Your feedback helps us improve.</p>
 
            <form action="#" method="POST" class="feedback-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
 
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
 
                <label for="comment">Comment:</label>
                <textarea id="comment" name="comment" rows="5" placeholder="Write your comment here..." required></textarea>
 
                <button type="submit" class="btn">Submit Feedback</button>
            </form>
        </div>
    </section>
 
    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 Anold's Fast Bites | All Rights Reserved</p>
            <div class="socials">
                <a href="#">Facebook</a> |
                <a href="#">Instagram</a> |
                <a href="#">Twitter</a>
            </div>
        </div>
    </footer>
</body>
</html>
